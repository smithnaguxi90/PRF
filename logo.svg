<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20010904//EN"
 "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="300" height="300">
    <defs>
        <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d4af37"/>
            <stop offset="25%" stop-color="#fff4cc"/> <stop offset="50%" stop-color="#c59b27"/>
            <stop offset="75%" stop-color="#fceda1"/> <stop offset="100%" stop-color="#8a6e05"/>
        </linearGradient>

        <linearGradient id="navy-bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1b365d"/>
            <stop offset="100%" stop-color="#071324"/>
        </linearGradient>

        <filter id="text-shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
        
        <filter id="shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <g filter="url(#shield-shadow)">
        <path d="M 256 30 L 460 110 L 460 300 Q 460 440 256 490 Q 52 440 52 300 L 52 110 Z" 
              fill="url(#navy-bg)" 
              stroke="url(#gold-metal)" 
              stroke-width="24" 
              stroke-linejoin="round"/>

        <path d="M 256 60 L 434 130 L 434 295 Q 434 415 256 460 Q 78 415 78 295 L 78 130 Z" 
              fill="none" 
              stroke="#ffffff" 
              stroke-width="2" 
              opacity="0.15"/>

        <path d="M 256 30 L 460 110 L 460 220 Q 256 260 52 220 L 52 110 Z" 
              fill="#ffffff" 
              opacity="0.08"/>

        <text x="256" y="315" 
              font-family="Arial, Helvetica, sans-serif" 
              font-size="140" 
              font-weight="900" 
              fill="url(#gold-metal)" 
              text-anchor="middle" 
              letter-spacing="4" 
              filter="url(#text-shadow)">PRF</text>
    </g>
</svg>